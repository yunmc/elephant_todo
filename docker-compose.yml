services:
  # Nuxt 应用
  app:
    image: ${APP_IMAGE:-registry.cn-shanghai.aliyuncs.com/sigmalove/elephant-todo:latest}
    container_name: elephant-app
    restart: always
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      # 数据库
      - NUXT_DB_HOST=mysql
      - NUXT_DB_PORT=3306
      - NUXT_DB_USER=elephant
      - NUXT_DB_PASSWORD=${DB_PASSWORD:-Ele8hant#App2026!mQ}
      - NUXT_DB_NAME=elephant_todo
      # JWT
      - NUXT_JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - NUXT_JWT_EXPIRES_IN=7d
      - NUXT_JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change-me-refresh}
      - NUXT_JWT_REFRESH_EXPIRES_IN=30d
      # LLM
      - NUXT_GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - NUXT_GEMINI_BASE_URL=${GEMINI_BASE_URL:-https://go.sbgpt.site/v1}
      - NUXT_GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-pro}
      - NUXT_DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - NUXT_DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://llmapi.blsc.cn/v1}
      - NUXT_DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-DeepSeek-V3.2}
      # 邮件
      - NUXT_SMTP_HOST=${SMTP_HOST:-}
      - NUXT_SMTP_PORT=${SMTP_PORT:-465}
      - NUXT_SMTP_SECURE=${SMTP_SECURE:-true}
      - NUXT_SMTP_USER=${SMTP_USER:-}
      - NUXT_SMTP_PASS=${SMTP_PASS:-}
      - NUXT_SMTP_FROM=${SMTP_FROM:-}
      - NUXT_RESET_PASSWORD_URL=${RESET_PASSWORD_URL:-http://localhost:3001/reset-password}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - elephant-network

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: elephant-mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-Ele8hant#Db2026!xK}
      - MYSQL_DATABASE=elephant_todo
      - MYSQL_USER=elephant
      - MYSQL_PASSWORD=${DB_PASSWORD:-Ele8hant#App2026!mQ}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/migrate-all.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # ports:
    #   - "3306:3306"  # 不暴露到公网，仅容器内网访问
    command: >
      --authentication-policy=mysql_native_password
      --sort_buffer_size=4M
      --max_allowed_packet=64M
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - elephant-network

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: elephant-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - elephant-network

volumes:
  mysql_data:

networks:
  elephant-network:
    driver: bridge
