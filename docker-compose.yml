services:
  # Nuxt 应用
  app:
    image: ${APP_IMAGE:-elephant-todo:latest}
    container_name: elephant-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=elephant
      - DB_PASSWORD=${DB_PASSWORD:-elephant123}
      - DB_NAME=elephant_todo
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_EXPIRES_IN=7d
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change-me-refresh}
      - JWT_REFRESH_EXPIRES_IN=30d
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_BASE_URL=${GEMINI_BASE_URL:-https://go.sbgpt.site/v1}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-pro}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://llmapi.blsc.cn/v1}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-DeepSeek-V3.2}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_SECURE=${SMTP_SECURE:-true}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - RESET_PASSWORD_URL=${RESET_PASSWORD_URL:-http://localhost:3000/reset-password}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - elephant-network

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: elephant-mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root123}
      - MYSQL_DATABASE=elephant_todo
      - MYSQL_USER=elephant
      - MYSQL_PASSWORD=${DB_PASSWORD:-elephant123}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    command: >
      --authentication-policy=mysql_native_password
      --sort_buffer_size=4M
      --max_allowed_packet=64M
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - elephant-network

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: elephant-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - elephant-network

volumes:
  mysql_data:

networks:
  elephant-network:
    driver: bridge
